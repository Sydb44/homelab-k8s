apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      nodeSelector:
        kubernetes.io/hostname: srv-01
      initContainers:
        - name: dind
          image: docker:dind
          restartPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - docker -H tcp://localhost:2375 info
            periodSeconds: 1
            failureThreshold: 60
      containers:
        - name: runner
          image: gitea/act_runner:latest
          env:
            - name: GITEA_INSTANCE_URL
              value: https://git.silion.dev
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: token
            - name: GITEA_RUNNER_NAME
              value: k8s-runner
            - name: DOCKER_HOST
              value: tcp://localhost:2375
      volumes:
        - name: dind-storage
          emptyDir: {}
