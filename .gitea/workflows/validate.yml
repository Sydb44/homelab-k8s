name: Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          find . -name '*.yaml' -not -path './.gitea/*' -not -path './traefik/*' -not -name 'secret.yaml' -not -name '.sops.yaml' | xargs kubeconform -strict -ignore-missing-schemas

      - name: Validate SOPS encryption
        run: |
          find . -name 'secret.yaml' | while read f; do
            grep -q 'encrypted_regex' "$f" || { echo "NOT encrypted: $f"; exit 1; }
          done
